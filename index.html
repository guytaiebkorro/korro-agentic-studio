<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Korro - Agentic Studio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #fff; color: #1a1a18; }
  :root {
    --bg1: #ffffff; --bg2: #f4f3ee; --bg3: #eceae3;
    --t1: #1a1a18; --t2: #3d3d3a; --t3: #5f5e5a;
    --b1: rgba(0,0,0,0.4); --b2: rgba(0,0,0,0.3); --b3: rgba(0,0,0,0.15);
    --fs-hero: 46px; --fs-h2: 30px; --fs-body: 16px; --fs-body-lg: 17px;
    --fs-small: 14px; --fs-label: 12px; --fs-stat: 36px;
    --fw-heading: 600; --fw-body: 400;
    --lh-body: 1.6; --lh-tight: 1.4;
    --gap-section: 2rem; --gap-card: 14px;
    --pad-card: 1.2rem 1.4rem; --pad-slide: 2.8rem 3.5rem;
  }
  @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .slide-enter { animation: fadeSlideIn 0.2s ease-out; }
  .slide-container { max-width: 1100px; margin: 0 auto; width: 100%; }
  button { font-family: inherit; cursor: pointer; }
  ul { list-style: none; padding-left: 0; }
  li { margin-bottom: 0.35rem; font-size: var(--fs-small); line-height: var(--lh-body); padding-left: 1.1rem; position: relative; }
  li::before { content: "\2014"; position: absolute; left: 0; color: var(--t3); font-size: 12px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const weeks = [
  { label:"Week 1", sub:"Concept", color:"#EEEDFE", border:"#AFA9EC", text:"#3C3489" },
  { label:"Week 2", sub:"Build",   color:"#FAECE7", border:"#F0997B", text:"#4A1B0C" },
  { label:"Week 3", sub:"Build + Levels", color:"#FAECE7", border:"#F0997B", text:"#4A1B0C" },
  { label:"Week 4", sub:"QA + Fixes", color:"#E1F5EE", border:"#5DCAA5", text:"#085041" },
];

const stations = [
  { name:"KSV input", week:"Feed", lead:"External", ai:null, human:"KSV delivers the source material - real-world content, pedagogical goals, target audience - that seeds the pipeline. Not a station we own, but everything downstream depends on this input.", color:"#FFF1D6", border:"#E0A84C", tc:"#6B4A0A", isFeed:true },
  { n:"01", name:"Korrofication",   week:"Week 1",   lead:"Shared",    ai:"Generates game concepts that korrofy the KSV input - adapting real-world content into our mechanics, narrative, and tone", human:"Selects and refines the concept, ensures it is both faithful to source and fits the Korro brand",
    examplePrompt:"Given the KSV input on early mammals, generate three game concepts that fit our mechanics library and narrative style.",
    exampleSkills:"Korro narrative style, mechanics catalog lookup, pedagogical framing",
    exampleOutput:"Three short pitch briefs with theme, core loop, tone reference, and pedagogical hook",
    color:"#EEEDFE", border:"#AFA9EC", tc:"#3C3489" },
  { n:"02", name:"Spec definition", week:"Week 1",   lead:"Product",   ai:"Drafts feature doc and scope from template",                       human:"Product owns this station - reviews the draft, locks scope, and is responsible for the spec",
    examplePrompt:"Turn the approved pitch into a complete feature spec using the Korro template.",
    exampleSkills:"Spec template authoring, scope reasoning, dependency identification",
    exampleOutput:"Completed spec doc with feature list, scope, dependencies, and open questions",
    color:"#EEEDFE", border:"#AFA9EC", tc:"#3C3489" },
  { n:"03", name:"Concept design",  week:"Week 1",   lead:"Designer",  ai:"Generates moodboards, wireframes, component map",                  human:"Art direction and UX decisions",
    examplePrompt:"Produce moodboard, wireframes, and component map for the spec - 2D visual direction.",
    exampleSkills:"Visual reference generation, UI component mapping, layout generation",
    exampleOutput:"Moodboard images, wireframes, and a component manifest",
    color:"#EEEDFE", border:"#AFA9EC", tc:"#3C3489" },
  { n:"G1", name:"Design committee",week:"Week 1",   lead:"Committee", ai:null, human:"Design committee reviews the concept - visual direction, UX, and game design - before production begins.", color:"#FFF8E1", border:"#E0C15B", tc:"#6B5900", isGate:true },
  { n:"04", name:"Asset creation",  week:"Week 1-2", lead:"Designer",  ai:"Batch export pipeline, naming conventions, sprite sheets",         human:"Creates and approves final art",
    examplePrompt:"Generate the sprite set and UI assets per the approved component map.",
    exampleSkills:"Batch asset generation, naming conventions, variant expansion",
    exampleOutput:"Organised asset folder with named sprites, UI elements, and export variants",
    color:"#EEEDFE", border:"#AFA9EC", tc:"#3C3489" },
  { n:"05", name:"Code spec",       week:"Week 2",   lead:"Developer", ai:"Translates design doc into technical spec and task breakdown",      human:"Steer and verify system integrity",
    examplePrompt:"Turn the feature spec into a technical implementation plan and break it into Jira tickets.",
    exampleSkills:"Code architecture reasoning, ticket breakdown, dependency mapping",
    exampleOutput:"Technical spec plus a list of Jira tickets with acceptance criteria",
    color:"#FAECE7", border:"#F0997B", tc:"#4A1B0C" },
  { n:"06", name:"Coding",          week:"Week 2",   lead:"Developer", ai:"Builds scaffold and mechanics from spec (coding agent)",           human:"Reviews output, steers loop feel",
    examplePrompt:"Implement the mechanics and systems described in the technical spec.",
    exampleSkills:"AgentGames assembly patterns, Unity C#, adapter usage",
    exampleOutput:"Working code scaffolds, mechanics, and system integrations",
    color:"#FAECE7", border:"#F0997B", tc:"#4A1B0C" },
  { n:"07", name:"Entity authoring", week:"Week 2",  lead:"Developer", ai:"Scaffolds entity manifests and base component configs from the spec",
    human:"Heavy lifting - wiring game objects, positioning elements in the scene, fine-tuning behaviour. The hands-on work an agent struggles with stays with the developer.",
    examplePrompt:"Scaffold entity manifests and starting component configs from the game spec.",
    exampleSkills:"Manifest scaffolding, entity composition, baseline component configuration",
    exampleOutput:"Starting entity manifests - developer takes over for the scene wiring and positioning work",
    color:"#FAECE7", border:"#F0997B", tc:"#4A1B0C" },
  { n:"08", name:"Level design",    week:"Week 3",   lead:"Shared",    ai:"Generates level layouts, difficulty curves, and progression from manifest", human:"Playtests, tunes pacing, approves final level set",
    examplePrompt:"Produce a progression of 20 levels with the specified difficulty curve and pacing.",
    exampleSkills:"Level generation, difficulty tuning, progression design",
    exampleOutput:"20 level manifests with metadata tagging difficulty and pacing",
    color:"#FAECE7", border:"#F0997B", tc:"#4A1B0C" },
  { n:"G2", name:"KSV metrics & analytics review", week:"Week 3", lead:"KSV", ai:null, human:"KSV reviews the metrics and analytics plan - ensures the game is set up to measure what matters before implementation begins.", color:"#FFF8E1", border:"#E0C15B", tc:"#6B5900", isGate:true },
  { n:"09", name:"Analytics",       week:"Week 3",   lead:"Developer", ai:"Wires the event tagging into the codebase once the schema is defined",
    human:"Heavy lifting - defining the metrics, events, and funnel that matter for this game. What to measure is a human decision; the agent only helps hook it up.",
    examplePrompt:"Given the approved analytics schema, instrument the game code with the defined events.",
    exampleSkills:"Event instrumentation, code wiring, schema adherence",
    exampleOutput:"Event tagging integrated into game code - the schema itself is human-authored",
    color:"#FAECE7", border:"#F0997B", tc:"#4A1B0C" },
  { n:"10", name:"QA",              week:"Week 4",   lead:"Developer", ai:"Light automation - smoke tests and regression sweeps",             human:"Mostly human - playtesting, edge cases, and sign-off on the final build",
    examplePrompt:"Run the standard smoke test suite and flag anything failing.",
    exampleSkills:"Automated test harness, regression sweeps, bug triage",
    exampleOutput:"Automated test report; all deep QA and sign-off is done by humans",
    color:"#E1F5EE", border:"#5DCAA5", tc:"#085041" },
  { n:"G3", name:"Games committee", week:"Week 4", lead:"Committee", ai:null, human:"Games committee final review - quality, pedagogical fit, and readiness. The last approval before a game is released.", color:"#FFF8E1", border:"#E0C15B", tc:"#6B5900", isGate:true },
];

const phases = [
  { n:"Phase 1", title:"Build the agents and systems", duration:"Weeks 1-4", color:"#EEEDFE", border:"#AFA9EC", tc:"#3C3489",
    items:["AgentGames assembly created, manifest schema defined","Flow, Tutorial, Scoring systems wrapped with adapters","First agents configured: Ideation, Spec, Concept Design, Asset, Code Spec, Jira","Spec template locked and ready for use on the first game"],
    why:"Foundation first. The agents and the systems they drive have to exist before any game can be built through them." },
  { n:"Phase 2", title:"Create the first game", duration:"Weeks 5-8", color:"#FAECE7", border:"#F0997B", tc:"#4A1B0C",
    items:["First game run end-to-end through the new pipeline","Every station exercised with real content for the first time","Gaps and rough edges in agents and systems documented","Game ready by week 8"],
    why:"The first game is the real test. It surfaces what the system actually does and does not handle - lessons no amount of planning would have revealed." },
  { n:"Phase 3", title:"Second iteration of the systems", duration:"Weeks 9-12", color:"#EEEDFE", border:"#AFA9EC", tc:"#3C3489",
    items:["Fix the gaps and rough edges surfaced by the first game","Tighten agent prompts, skills, and outputs based on real usage","Stabilise the adapters and manifest schema","Harden the handoffs between stations"],
    why:"Iterate on what you now know. The first game gives honest feedback - the systems get their second pass with real evidence behind every change." },
  { n:"Phase 4", title:"Create two games in parallel", duration:"Weeks 13-16", color:"#FAECE7", border:"#F0997B", tc:"#4A1B0C",
    items:["Two games run through the improved pipeline at the same time","Lessons from phase 2 applied at every station","First real test that the pipeline scales beyond a single game in flight","Both games ready by week 16"],
    why:"One game is a proof of concept, two in parallel is the real test of throughput. This is where the pipeline earns the right to scale." },
  { n:"Phase 5", title:"Stabilize and move into full production", duration:"Weeks 17+", color:"#E1F5EE", border:"#5DCAA5", tc:"#085041",
    items:["Final stabilisation of agents, systems, and pipeline","Weekly cadence established - one game in, one game out","QA automation introduced alongside human QA","Full production mode with the rest of the studio onboarded"],
    why:"Full throughput. The pipeline is now trusted - the team shifts from building the system to running games through it at cadence." },
];

const pioneerNote = "This is not an established playbook. Fully agentic game production - where AI authors logic, levels, and specs and humans steer and verify - is frontier territory. We will learn as we build, adapt the pipeline to what works, and publish what we discover. Some of the answers do not exist yet.";

const roles = [
  { role:"Designer",
    before:["Creates concepts, moodboards, and visual references manually","Produces all sprites, animations, and UI assets from scratch","Participates in game definition and level design","Asset naming and wiring done by hand per game"],
    after:["Art-directs AI-generated concepts and moodboards","Approves and refines agent-produced asset batches","Animates and authors final assets - prefab authoring stays human","Focuses on visual quality and creative direction over production volume"],
    color:"#EEEDFE", border:"#AFA9EC", tc:"#3C3489" },
  { role:"Developer",
    before:["Builds systems and mechanics from scratch each game","Creates entity prefabs and wires behaviours manually","Authors game flow and levels in custom editors","Manual analytics tagging and scriptable object wiring"],
    after:["Steers coding agents on systems, mechanics, and behaviours","Reviews agent-authored levels and flow logic","Owns architecture, entity structure, and system integrity","Co-leads ideation and game definition alongside designers"],
    color:"#E1F5EE", border:"#5DCAA5", tc:"#085041" },
];

const risks = [
  { risk:"Game feel cannot be specified", detail:"A coding agent working from a manifest will produce code that is locally correct but globally wrong. It satisfies the spec but misses the feel entirely.", mitigation:"Every build gets played by a developer within 24 hours. Feel feedback goes back into steering immediately.", severity:"high" },
  { risk:"The 4-week chain is fragile", detail:"Three games run in parallel, staggered by one week. One blocked game can ripple through the whole pipeline - the weekly cadence leaves little slack.", mitigation:"Define a clear slip protocol before the pipeline starts. A game that cannot be ready on time gets held - not rushed. The stagger means at most one game slips, not all three.", severity:"high" },
  { risk:"External review cycles are pipeline killers", detail:"Design committee, KSV metrics review, and Games committee sign-off are not optional - but a single late approval can collapse the week it was supposed to ready.", mitigation:"External review gates must be scheduled as fixed pipeline events. Feedback requiring re-ideation triggers a formal pipeline reset, not an in-flight rescue.", severity:"high" },
  { risk:"Agent output drift over time", detail:"Two runs of the same spec can produce structurally different code. Similar mechanics get implemented differently across titles.", mitigation:"Establish a code review standard from game one. Patterns that work get documented and fed back into agent context.", severity:"med" },
  { risk:"Agent gets stuck and nobody knows why", detail:"The agent produces something broken. Three hours later more time has been spent prompting than it would have taken to write the code.", mitigation:"Hard escalation rule: after two failed steering attempts, the developer takes over directly.", severity:"med" },
];

const designShifts = [
  { area:"Concept ideation", before:"Mood references gathered manually, themes debated in open meetings, mechanic ideas sketched by hand", after:"Designer provides a constraint brief. Agent generates 3-5 full pitch decks. Designer selects and refines.", gain:"1hr meeting → 20min selection", color:"#EEEDFE", border:"#AFA9EC", tc:"#3C3489" },
  { area:"Visual concept",   before:"Designers produce moodboards, wireframes, and component maps from scratch. Multiple revision rounds.", after:"Agent generates moodboards, wireframes, and component map from the approved pitch. Designer art-directs.", gain:"Days of exploration → hours of direction", color:"#EEEDFE", border:"#AFA9EC", tc:"#3C3489" },
  { area:"Asset creation",   before:"Each game requires a full new asset set. Sprites, UI, audio sourced individually. Naming inconsistent.", after:"Agent runs batch pipeline from visual spec - generates variants, exports at correct sizes, applies naming conventions.", gain:"Full asset sets in hours, not days", color:"#EEEDFE", border:"#AFA9EC", tc:"#3C3489" },
  { area:"Spec handoff",     before:"Specs were functional but often incomplete - enough for an experienced team to fill the gaps.", after:"Manifest format requires every detail explicit upfront. Specs become the most complete they have ever been.", gain:"Good enough → complete", color:"#FAECE7", border:"#F0997B", tc:"#4A1B0C" },
];

const sevMap = {
  high: { bg:"#FCEBEB", br:"#F09595", tc:"#791F1F", label:"High" },
  med:  { bg:"#FAEEDA", br:"#EF9F27", tc:"#633806", label:"Med"  }
};

function Badge({ color, border, tc, children }) {
  return <div style={{ background:color, border:"0.5px solid "+border, borderRadius:6, padding:"2px 8px", fontSize:"var(--fs-label)", fontWeight:500, color:tc, display:"inline-block" }}>{children}</div>;
}
function SlideHeader({ title, subtitle }) {
  return (
    <div>
      <h2 style={{ fontSize:"var(--fs-h2)", fontWeight:"var(--fw-heading)", color:"var(--t1)", lineHeight:1.2, letterSpacing:"-0.01em" }}>{title}</h2>
      {subtitle && <p style={{ marginTop:"0.45rem", fontSize:"var(--fs-body)", color:"var(--t2)", lineHeight:"var(--lh-body)", fontWeight:"var(--fw-body)", maxWidth:680 }}>{subtitle}</p>}
    </div>
  );
}
function SectionLabel({ children }) {
  return <div style={{ fontSize:"var(--fs-label)", fontWeight:500, color:"var(--t3)", textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:"0.6rem" }}>{children}</div>;
}
function CardBox({ children, style }) {
  return <div style={{ background:"var(--bg1)", border:"0.5px solid var(--b3)", borderRadius:10, padding:"var(--pad-card)", ...style }}>{children}</div>;
}
function Note({ children, accent }) {
  var base = { background: accent ? "linear-gradient(90deg, " + accent + "08, var(--bg2))" : "var(--bg2)", borderRadius:8, padding:"0.85rem 1.25rem", fontSize:13, color:"var(--t2)", lineHeight:"var(--lh-body)" };
  if (accent) { base.borderLeft = "3px solid " + accent; base.borderTopLeftRadius = 0; base.borderBottomLeftRadius = 0; }
  return <div style={base}>{children}</div>;
}
function VideoWithFallback({ src, label, borderColor }) {
  var [failed, setFailed] = useState(false);
  if (failed) {
    return (
      <div style={{ width:"100%", borderRadius:8, border:"0.5px solid " + borderColor, background:"var(--bg2)", display:"flex", alignItems:"center", justifyContent:"center", aspectRatio:"16/9", flexDirection:"column", gap:8 }}>
        <div style={{ fontSize:28, opacity:0.3 }}>&#9654;</div>
        <div style={{ fontSize:"var(--fs-small)", color:"var(--t3)" }}>{label}</div>
        <div style={{ fontSize:"var(--fs-label)", color:"var(--t3)", opacity:0.6 }}>Video unavailable</div>
      </div>
    );
  }
  return <video src={src} autoPlay muted loop playsInline onError={function() { setFailed(true); }} style={{ width:"100%", borderRadius:8, border:"0.5px solid " + borderColor }} />;
}

/* ── Slides ── */

function SlideVision() {
  return (
    <div style={{ display:"flex", flexDirection:"column", gap:"var(--gap-section)" }}>
      <div>
        <div style={{ fontSize:"var(--fs-label)", fontWeight:500, letterSpacing:"0.08em", color:"var(--t3)", textTransform:"uppercase", marginBottom:"0.6rem" }}>Korro Studio</div>
        <h1 style={{ fontSize:"var(--fs-hero)", fontWeight:700, lineHeight:1.1, color:"var(--t1)", letterSpacing:"-0.02em" }}>One game. Every week.</h1>
      </div>
      <p style={{ fontSize:"var(--fs-body-lg)", color:"var(--t2)", maxWidth:520, lineHeight:"var(--lh-body)" }}>We are restructuring the studio around an agentic pipeline - a system where AI handles the repeatable work at every station, and our team focuses on creative direction, quality, and decisions that require human judgment.</p>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:"var(--gap-card)", maxWidth:560 }}>
        {[["3","designers"],["3","developers"],["1","product"],["1","game / week"]].map(function(item) {
          return (
            <div key={item[1]} style={{ background:"var(--bg2)", borderRadius:8, padding:"0.85rem 1rem" }}>
              <div style={{ fontSize:"var(--fs-stat)", fontWeight:500, color:"var(--t1)", lineHeight:1 }}>{item[0]}</div>
              <div style={{ fontSize:"var(--fs-small)", color:"var(--t2)", marginTop:4 }}>{item[1]}</div>
            </div>
          );
        })}
      </div>
      <p style={{ fontSize:"var(--fs-small)", color:"var(--t3)", maxWidth:520 }}>A 4-week cycle per game. At any moment, three games are in flight simultaneously, staggered by one week. Each week, one is ready.</p>
    </div>
  );
}

function SlidePipeline() {
  var games = ["Game A","Game B","Game C"];
  var cells = [[0,1,2,3],[null,0,1,2],[null,null,0,1]];
  var cellDescs = [
    "Korrofication, spec, concept design",
    "Asset creation, code spec, coding",
    "Coding wrap-up, level design, analytics",
    "QA + bug fixes",
  ];
  return (
    <div style={{ display:"flex", flexDirection:"column", gap:"var(--gap-section)" }}>
      <SlideHeader title="The parallel pipeline" subtitle="Three games always in flight - staggered by one week each. Each game runs four weeks end-to-end." />
      <div style={{ display:"grid", gridTemplateColumns:"72px repeat(4,1fr)", gap:4 }}>
        <div/>
        {weeks.map(function(w) {
          return (
            <div key={w.label} style={{ textAlign:"center", padding:"8px 4px", background:"var(--bg2)", borderRadius:6 }}>
              <div style={{ fontSize:"var(--fs-small)", fontWeight:500, color:"var(--t1)" }}>{w.label}</div>
              <div style={{ fontSize:"var(--fs-label)", color:"var(--t2)" }}>{w.sub}</div>
            </div>
          );
        })}
        {games.map(function(g, gi) {
          return [
            <div key={g+"_l"} style={{ display:"flex", alignItems:"center", fontSize:"var(--fs-small)", color:"var(--t2)", paddingRight:8 }}>{g}</div>,
            cells[gi].map(function(wi, ci) {
              if (wi !== null) {
                return (
                  <div key={g+"_"+ci} style={{ background:weeks[wi].color, border:"0.5px solid "+weeks[wi].border, borderRadius:6, padding:"10px", minHeight:52, position:"relative" }}>
                    <div style={{ fontSize:"var(--fs-label)", fontWeight:500, color:weeks[wi].text }}>{weeks[wi].sub}</div>
                    <div style={{ fontSize:"var(--fs-label)", color:weeks[wi].text, opacity:0.7, marginTop:3, lineHeight:"var(--lh-tight)" }}>
                      {cellDescs[wi]}
                    </div>
                    {wi===3 && <div style={{ position:"absolute", top:6, right:6, fontSize:10, fontWeight:600, color:weeks[wi].text, background:"rgba(255,255,255,0.6)", borderRadius:4, padding:"1px 5px", letterSpacing:"0.04em", textTransform:"uppercase" }}>Ready</div>}
                  </div>
                );
              }
              return <div key={g+"_"+ci} style={{ borderRadius:6, minHeight:52 }}/>;
            })
          ];
        })}
      </div>
      <div style={{ display:"flex", gap:12, flexWrap:"wrap" }}>
        {[["#EEEDFE","#AFA9EC","#3C3489","Concept"],["#FAECE7","#F0997B","#4A1B0C","Build + Levels"],["#E1F5EE","#5DCAA5","#085041","QA + Ready"]].map(function(item) {
          return (
            <div key={item[3]} style={{ display:"flex", alignItems:"center", gap:6, fontSize:"var(--fs-small)", color:"var(--t2)" }}>
              <div style={{ width:10, height:10, borderRadius:2, background:item[0], border:"0.5px solid "+item[1] }}/>
              {item[3]}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function SlideStations() {
  var [active, setActive] = useState(0);
  var [exampleOpen, setExampleOpen] = useState(false);
  var s = stations[active];
  useEffect(function() { setExampleOpen(false); }, [active]);
  return (
    <div style={{ display:"flex", flexDirection:"column", gap:"var(--gap-section)" }}>
      <SlideHeader title="The pipeline stations" subtitle="Every game passes through the same sequence. Each station has a clear owner and a defined AI role. Gates pause the pipeline for external review. The feed before station 01 is KSV input - the source we adapt." />
      <div style={{ display:"flex", gap:6, alignItems:"center", flexWrap:"wrap" }}>
        {stations.map(function(st, i) {
          var isActive = active === i;
          var isGate = st.isGate;
          var isFeed = st.isFeed;
          var pillStyle;
          if (isFeed) {
            pillStyle = { background:isActive?st.color:"rgba(255,241,214,0.5)", border:"1.5px dotted "+(isActive?st.border:"#C99A3D"), borderRadius:6, padding:isActive?"4px 12px":"4px 10px", fontSize:"var(--fs-small)", fontWeight:isActive?500:400, color:isActive?st.tc:"#6B4A0A", cursor:"pointer", transition:"all 0.15s", display:"flex", alignItems:"center", gap:6 };
          } else if (isGate) {
            pillStyle = { background:isActive?st.color:"transparent", border:"1.5px dashed "+(isActive?st.border:"#D4C84A"), borderRadius:6, padding:isActive?"4px 12px":"4px 10px", fontSize:"var(--fs-small)", fontWeight:isActive?500:400, color:isActive?st.tc:"#9E8E00", cursor:"pointer", transition:"all 0.15s", display:"flex", alignItems:"center", gap:6 };
          } else {
            pillStyle = { background:isActive?st.color:"var(--bg2)", border:"0.5px solid "+(isActive?st.border:"var(--b3)"), borderRadius:6, padding:isActive?"4px 12px":"4px 10px", fontSize:"var(--fs-small)", fontWeight:isActive?500:400, color:isActive?st.tc:"var(--t3)", cursor:"pointer", transition:"all 0.15s", display:"flex", alignItems:"center", gap:6 };
          }
          return [
            <div key={"s"+i}
              onClick={function() { setActive(i); }}
              onMouseEnter={function(e) { if (!isActive) e.currentTarget.style.background = st.color; }}
              onMouseLeave={function(e) { if (!isActive) e.currentTarget.style.background = isFeed?"rgba(255,241,214,0.5)":(isGate?"transparent":"var(--bg2)"); }}
              style={pillStyle}>
              {isFeed && <span style={{ fontSize:12 }}>{"\u25B6"}</span>}
              {isGate && <span style={{ fontSize:12 }}>{"\u25C6"}</span>}
              {!isGate && !isFeed && <span style={{ fontVariantNumeric:"tabular-nums" }}>{st.n}</span>}
              {isActive && <span>{st.name}</span>}
              {!isActive && isGate && <span style={{ fontSize:"var(--fs-label)" }}>Gate</span>}
              {!isActive && isFeed && <span style={{ fontSize:"var(--fs-label)" }}>Feed</span>}
            </div>,

  );
}

// Set to true to require password on launch
const REQUIRE_PASSWORD = false;

function PasswordGate({ onUnlock }) {
  var [pw, setPw] = useState("");
  var [error, setError] = useState(false);
  function handleSubmit(e) {
    if (e) e.preventDefault();
    crypto.subtle.digest("SHA-256", new TextEncoder().encode(pw)).then(function(buf) {
      var hash = Array.from(new Uint8Array(buf)).map(function(b) { return b.toString(16).padStart(2,"0"); }).join("");
      if (hash === "69701f096901b699e4c1fe6b4f859a81befe255e5a5ab2ee52d225df1849cb3e") { onUnlock(); }
      else { setError(true); setTimeout(function() { setError(false); }, 1500); }
    });
  }
  return (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", height:"100vh", gap:"1.5rem", padding:"2rem" }}>
      <div style={{ textAlign:"center" }}>
        <div style={{ fontSize:"var(--fs-label)", fontWeight:500, letterSpacing:"0.08em", color:"var(--t3)", textTransform:"uppercase", marginBottom:"0.6rem" }}>Korro Studio</div>
        <h1 style={{ fontSize:"var(--fs-h2)", fontWeight:700, color:"var(--t1)", letterSpacing:"-0.02em" }}>Agentic Pipeline</h1>
        <p style={{ fontSize:"var(--fs-small)", color:"var(--t3)", marginTop:"0.5rem" }}>Enter password to continue</p>
      </div>
      <div style={{ display:"flex", gap:8, alignItems:"center" }}>
        <input
          type="password"
          value={pw}
          onChange={function(e) { setPw(e.target.value); }}
          onKeyDown={function(e) { if (e.key === "Enter") handleSubmit(); }}
          placeholder="Password"
          style={{ fontSize:"var(--fs-body)", padding:"8px 14px", borderRadius:8, border:"0.5px solid "+(error?"#F09595":"var(--b3)"), outline:"none", width:220, background:error?"#FCEBEB":"var(--bg1)", transition:"border-color 0.2s, background 0.2s", fontFamily:"inherit" }}
        />
        <button onClick={handleSubmit} style={{ fontSize:"var(--fs-small)", padding:"8px 18px", borderRadius:8, border:"0.5px solid var(--b2)", background:"var(--t1)", color:"var(--bg1)", fontWeight:500, fontFamily:"inherit" }}>Enter</button>
      </div>
      {error && <div style={{ fontSize:"var(--fs-small)", color:"#791F1F" }}>Incorrect password</div>}
    </div>
  );
}

function App() {
  var [unlocked, setUnlocked] = useState(!REQUIRE_PASSWORD);
  var [current, setCurrent] = useState(0);
  var SlideContent = slideComponents[current];

  useEffect(function() {
    function handleKey(e) {
      if (!unlocked) return;
      if (e.key === "ArrowRight" || e.key === "ArrowDown") { e.preventDefault(); setCurrent(function(c) { return Math.min(slideLabels.length - 1, c + 1); }); }
      if (e.key === "ArrowLeft" || e.key === "ArrowUp") { e.preventDefault(); setCurrent(function(c) { return Math.max(0, c - 1); }); }
    }
    window.addEventListener("keydown", handleKey);
    return function() { window.removeEventListener("keydown", handleKey); };
  }, [unlocked]);

  if (!unlocked) return <PasswordGate onUnlock={function() { setUnlocked(true); }} />;

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100vh", minHeight:600 }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0.65rem 1.5rem 0.65rem 2rem", borderBottom:"0.5px solid var(--b3)", flexShrink:0 }}>
        <div style={{ fontSize:"var(--fs-body)", fontWeight:600, color:"var(--t1)", letterSpacing:"-0.01em" }}>Korro</div>
        <div style={{ fontSize:"var(--fs-small)", color:"var(--t2)", fontWeight:400 }}>{slideLabels[current]}</div>
        <div style={{ fontSize:"var(--fs-label)", color:"var(--t3)", fontVariantNumeric:"tabular-nums" }}>{current+1} / {slideLabels.length}</div>
      </div>
      <div style={{ flex:1, padding:"var(--pad-slide)", overflow:"auto", display:"flex", alignItems:"safe center" }}>
        <div className="slide-container slide-enter" key={current} style={{ width:"100%" }}>
          <SlideContent/>
        </div>
      </div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"0.65rem 1.5rem", borderTop:"0.5px solid var(--b3)", flexShrink:0 }}>
        <NavButton onClick={function() { setCurrent(Math.max(0, current - 1)); }} disabled={current === 0}>Previous</NavButton>
        <div style={{ display:"flex", gap:5, alignItems:"center" }}>
          {slideLabels.map(function(label, i) {
            return <div key={i} title={label} onClick={function() { setCurrent(i); }}
              onMouseEnter={function(e) { if (i !== current) { e.currentTarget.style.opacity = "1"; e.currentTarget.style.transform = "scale(1.3)"; } }}
              onMouseLeave={function(e) { e.currentTarget.style.opacity = ""; e.currentTarget.style.transform = ""; }}
              style={{ width:i===current?22:7, height:7, borderRadius:4, background:i===current?"var(--t1)":"var(--b2)", cursor:"pointer", transition:"width 0.2s, background 0.2s, opacity 0.15s, transform 0.15s", opacity:i===current?1:0.7, transform:"scale(1)" }}/>;
          })}
        </div>
        <NavButton onClick={function() { setCurrent(Math.min(slideLabels.length - 1, current + 1)); }} disabled={current === slideLabels.length - 1}>Next</NavButton>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
